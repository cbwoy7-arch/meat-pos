<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#2e3b43">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<title>Meat Centre POS</title>
<style>
  :root { --dark:#2e3b43; --green:#7cb342; --greend:#618c2f; --bg:#eceff1;
          --red:#e53935; --text:#263238; }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent;
      font-family:Roboto,Arial,Helvetica,sans-serif; }
  body { background:var(--bg); color:var(--text); height:100dvh; display:flex;
         flex-direction:column; overflow:hidden; }
  header { background:var(--dark); color:#fff; padding:12px 14px; display:flex;
           justify-content:space-between; align-items:center; flex-shrink:0; }
  header h1 { font-size:17px; font-weight:500; display:flex; align-items:center; gap:8px; }
  header .back { font-size:22px; padding:0 6px 2px 0; cursor:pointer; }
  header .date { font-size:13px; opacity:.8; }
  main { flex:1; overflow-y:auto; padding:10px; }
  nav { display:flex; background:#fff; border-top:1px solid #d5dbdf; flex-shrink:0; }
  nav button { flex:1; padding:11px 0 max(11px, env(safe-area-inset-bottom)); border:0;
               background:none; font-size:14px; font-weight:bold; color:#90a4ae; letter-spacing:.5px; }
  nav button.on { color:var(--green); box-shadow:inset 0 3px 0 var(--green); }
  /* category & item grids */
  .grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .cat { border:0; border-radius:12px; color:#fff; font-size:18px; font-weight:bold;
         min-height:110px; box-shadow:0 1px 4px rgba(0,0,0,.2); }
  .cat small { display:block; font-weight:normal; font-size:13px; opacity:.9; margin-top:5px; }
  .igrid { display:grid; grid-template-columns:repeat(auto-fill,minmax(105px,1fr)); gap:8px; }
  .igrid button { padding:12px 6px; border:0; border-radius:10px; background:#fff;
                  box-shadow:0 1px 3px rgba(0,0,0,.15); font-size:14px; font-weight:bold;
                  color:var(--text); min-height:66px; border-top:4px solid var(--cc,#90a4ae); }
  .igrid button small { display:block; font-weight:normal; color:#607d8b; margin-top:4px; }
  .igrid button:active { background:#e8f2dc; }
  /* ticket bar + charge view */
  #tbar { flex-shrink:0; margin:0 10px 10px; background:var(--green); color:#fff; border:0;
          border-radius:10px; padding:14px; font-size:17px; font-weight:bold; display:flex;
          justify-content:space-between; box-shadow:0 2px 6px rgba(0,0,0,.25); }
  .ticket { background:#fff; border-radius:10px; box-shadow:0 1px 3px rgba(0,0,0,.15); padding:10px; }
  .ticket .line { display:flex; justify-content:space-between; padding:9px 2px;
                  border-bottom:1px solid #eee; font-size:15px; align-items:center; }
  .ticket .line .x { color:var(--red); font-weight:bold; padding:0 8px 0 14px; font-size:18px; cursor:pointer; }
  .ticket .tot { display:flex; justify-content:space-between; font-size:24px;
                 font-weight:bold; padding:12px 2px 6px; }
  .payrow { display:flex; gap:8px; margin-top:10px; }
  .payrow button { flex:1; padding:16px 0; border:0; border-radius:10px; color:#fff;
                   font-size:15px; font-weight:bold; }
  .p-cash { background:var(--green); } .p-eco { background:#1e88e5; } .p-swipe { background:#5e35b1; }
  /* qty modal, generic modal */
  .overlay { position:fixed; inset:0; background:rgba(0,0,0,.5); display:none;
             align-items:flex-end; z-index:10; }
  .overlay.open { display:flex; }
  .overlay .card { background:#fff; width:100%; border-radius:16px 16px 0 0; padding:16px; }
  .card h2 { font-size:18px; margin-bottom:2px; font-weight:500; }
  .card .price { color:var(--greend); font-size:14px; margin-bottom:10px; }
  .modetog { display:flex; gap:6px; margin-bottom:10px; }
  .modetog button { flex:1; padding:9px 0; border:1px solid var(--green); background:#fff;
                    color:var(--greend); border-radius:8px; font-size:15px; font-weight:bold; }
  .modetog button.on { background:var(--green); color:#fff; border-color:var(--green); }
  #qty { width:100%; font-size:30px; padding:10px; border:2px solid var(--green);
         border-radius:10px; text-align:center; }
  #conv { text-align:center; color:#555; font-size:16px; padding:8px 0; min-height:34px; }
  .mbtns { display:flex; gap:8px; }
  .mbtns button { flex:1; padding:13px 0; border:0; border-radius:10px; font-size:16px; font-weight:bold; }
  .ok { background:var(--green); color:#fff; } .cancel { background:#dfe4e7; color:var(--text); }
  /* pin pad */
  #pinwrap { position:fixed; inset:0; background:var(--dark); display:none; z-index:30;
             flex-direction:column; align-items:center; justify-content:center; color:#fff; }
  #pinwrap.open { display:flex; }
  #pintitle { font-size:17px; margin-bottom:14px; }
  #pindots { display:flex; gap:14px; margin-bottom:22px; min-height:16px; }
  #pindots i { width:14px; height:14px; border-radius:50%; border:2px solid #fff; }
  #pindots i.f { background:var(--green); border-color:var(--green); }
  .pinpad { display:grid; grid-template-columns:repeat(3,72px); gap:12px; }
  .pinpad button { width:72px; height:64px; border-radius:12px; border:0; font-size:24px;
                   background:rgba(255,255,255,.12); color:#fff; }
  .pinpad button:active { background:var(--green); }
  #pincancel { margin-top:22px; background:none; border:0; color:#b0bec5; font-size:15px; }
  /* success screen */
  #done { position:fixed; inset:0; background:var(--green); display:none; z-index:40;
          flex-direction:column; align-items:center; justify-content:center; color:#fff; }
  #done.open { display:flex; }
  #done .circ { width:110px; height:110px; border-radius:50%; background:#fff;
                color:var(--green); font-size:64px; line-height:110px; text-align:center;
                margin-bottom:20px; font-weight:bold; }
  #done .amt { font-size:42px; font-weight:bold; }
  #done .how { font-size:18px; opacity:.95; margin-top:6px; }
  #done .msg { font-size:14px; opacity:.85; margin-top:16px; }
  #done .prbtn { margin-top:22px; background:#fff; color:var(--greend); border:0;
                 border-radius:10px; padding:14px 30px; font-size:16px; font-weight:bold; }
  /* office */
  .subnav { display:flex; gap:6px; margin-bottom:10px; flex-wrap:wrap; }
  .subnav button { flex:1 1 30%; padding:10px 0; border:1px solid #b0bec5; background:#fff;
                   border-radius:8px; font-size:12px; font-weight:bold; color:#607d8b; }
  .subnav button.on { background:var(--dark); color:#fff; border-color:var(--dark); }
  .kpis { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin:8px 0; }
  .kpi { background:#fff; border-radius:10px; padding:10px; text-align:center;
         box-shadow:0 1px 3px rgba(0,0,0,.15); }
  .kpi b { display:block; font-size:18px; color:var(--greend); }
  .kpi span { font-size:12px; color:#78909c; }
  table { width:100%; background:#fff; border-radius:10px; border-collapse:collapse;
          overflow:hidden; box-shadow:0 1px 3px rgba(0,0,0,.15); font-size:14px; }
  th { background:var(--dark); color:#fff; padding:8px; text-align:left; font-size:13px; font-weight:500; }
  td { padding:8px; border-bottom:1px solid #eee; }
  td.n, th.n { text-align:right; }
  .toolbar { display:flex; gap:6px; flex-wrap:wrap; margin:10px 0; align-items:center; }
  .toolbar button, .toolbar input[type=date] { padding:9px 11px; border:1px solid #b0bec5;
      border-radius:8px; background:#fff; font-size:14px; font-weight:bold; color:var(--text); }
  .salecard { background:#fff; border-radius:10px; padding:9px 11px; margin-top:8px;
              box-shadow:0 1px 3px rgba(0,0,0,.15); font-size:14px; }
  .salecard.void { opacity:.5; text-decoration:line-through; }
  .salecard .top { display:flex; justify-content:space-between; font-weight:bold; }
  .salecard .voidbtn { color:var(--red); background:none; border:1px solid var(--red);
                       border-radius:6px; padding:3px 9px; font-size:12px; font-weight:bold; }
  .salecard .lines { color:#607d8b; font-size:13px; margin-top:3px; }
  .itemrow { display:flex; gap:5px; margin-bottom:6px; align-items:center; }
  .itemrow input, .itemrow select { padding:9px 6px; border:1px solid #cfd8dc; border-radius:8px;
                                    font-size:13px; background:#fff; min-width:0; }
  .itemrow .nm { flex:2.6; } .itemrow .un { flex:.9; } .itemrow .pr { flex:1.1; } .itemrow .ct { flex:1.6; }
  .itemrow .co, .itemrow .st, .itemrow .lo { flex:1.1; }
  .itemrow .del { color:var(--red); font-size:19px; font-weight:bold; padding:0 4px; background:none; border:0; }
  .icard { background:#fff; border-radius:10px; padding:9px; margin-bottom:8px;
           box-shadow:0 1px 3px rgba(0,0,0,.15); }
  .icard .itemrow input { background:#fafafa; }
  .itemrow.lab { margin:2px 0; }
  .itemrow.lab span { font-size:10px; color:#90a4ae; text-transform:uppercase;
                      letter-spacing:.4px; padding:0 6px; }
  .bigbtn { width:100%; padding:13px 0; border:0; border-radius:10px; background:var(--green);
            color:#fff; font-size:16px; font-weight:bold; margin-top:8px; }
  .bigbtn.grey { background:#546e7a; }
  .note { font-size:12px; color:#78909c; margin-top:8px; line-height:1.5; }
  .setrow { background:#fff; border-radius:10px; padding:13px; margin-bottom:8px;
            box-shadow:0 1px 3px rgba(0,0,0,.15); display:flex; justify-content:space-between;
            align-items:center; font-size:15px; }
  .setrow button { border:1px solid #b0bec5; background:#fff; border-radius:8px;
                   padding:8px 13px; font-weight:bold; font-size:13px; color:var(--text); }
  #toast { position:fixed; top:14px; left:50%; transform:translateX(-50%); background:var(--greend);
           color:#fff; padding:10px 22px; border-radius:24px; font-weight:bold; display:none;
           z-index:50; max-width:88%; text-align:center; }
</style>
</head>
<body>
<header>
  <h1 id="hdr">Meat Centre POS</h1>
  <div class="date" id="hdrdate"></div>
</header>
<main id="main"></main>
<button id="tbar" style="display:none" onclick="view='charge';render()"></button>
<nav>
  <button id="nav-sell" class="on" onclick="goSell()">SELL</button>
  <button id="nav-office" onclick="goOffice()">BACK OFFICE</button>
</nav>

<div class="overlay" id="modal">
  <div class="card">
    <h2 id="m-name"></h2>
    <div class="price" id="m-price"></div>
    <div class="modetog">
      <button id="tog-kg" class="on" onclick="setMode('kg')">By weight</button>
      <button id="tog-usd" onclick="setMode('usd')">By $ amount</button>
    </div>
    <input id="qty" type="number" inputmode="decimal" step="any" min="0" placeholder="0.000" oninput="conv()">
    <div id="conv"></div>
    <div class="mbtns">
      <button class="cancel" onclick="closeModal()">Cancel</button>
      <button class="ok" onclick="addLine()">ADD</button>
    </div>
  </div>
</div>

<div class="overlay" id="confirm" style="align-items:center">
  <div class="card" style="border-radius:16px;margin:0 20px">
    <h2 id="c-text" style="margin-bottom:14px"></h2>
    <div class="mbtns">
      <button class="cancel" onclick="closeConfirm(false)">Cancel</button>
      <button class="ok" style="background:var(--red)" id="c-yes" onclick="closeConfirm(true)">YES</button>
    </div>
  </div>
</div>

<div class="overlay" id="adjmodal" style="align-items:center">
  <div class="card" style="border-radius:16px;margin:0 20px">
    <h2 id="adj-title">Adjust stock</h2>
    <div class="note" id="adj-cur" style="margin:4px 0 10px"></div>
    <input id="adj-qty" type="number" inputmode="decimal" step="any"
           style="width:100%;font-size:24px;padding:10px;border:2px solid var(--green);border-radius:10px;text-align:center"
           placeholder="true quantity">
    <input id="adj-why"
           style="width:100%;margin-top:8px;padding:10px;border:1px solid #cfd8dc;border-radius:8px;font-size:14px"
           placeholder="Reason (required — e.g. stock-take, spoilage)">
    <div class="mbtns" style="margin-top:10px">
      <button class="cancel" onclick="adjClose()">Cancel</button>
      <button class="ok" onclick="adjSave()">SAVE</button>
    </div>
  </div>
</div>

<div id="pinwrap">
  <div id="pintitle">Enter owner PIN</div>
  <div id="pindots"><i></i><i></i><i></i><i></i></div>
  <div class="pinpad">
    <button onclick="pinKey(1)">1</button><button onclick="pinKey(2)">2</button><button onclick="pinKey(3)">3</button>
    <button onclick="pinKey(4)">4</button><button onclick="pinKey(5)">5</button><button onclick="pinKey(6)">6</button>
    <button onclick="pinKey(7)">7</button><button onclick="pinKey(8)">8</button><button onclick="pinKey(9)">9</button>
    <button style="visibility:hidden"></button><button onclick="pinKey(0)">0</button><button onclick="pinKey(-1)">⌫</button>
  </div>
  <button id="pincancel" onclick="pinCancel()">Cancel</button>
</div>

<div id="done" onclick="hideDone()">
  <div class="circ">✓</div>
  <div class="amt" id="d-amt"></div>
  <div class="how" id="d-how"></div>
  <button class="prbtn" onclick="event.stopPropagation();printLast()">🖨 PRINT RECEIPT</button>
  <div class="msg">Sale recorded — tap to continue</div>
</div>
<div id="toast"></div>

<script>
// ---------------- data ----------------
const CAT_COLORS = { 'Beef':'#e53935', 'Chicken':'#fb8c00', 'Pork':'#d81b60', 'Processed':'#8e24aa' };
const PALETTE = ['#e53935','#fb8c00','#d81b60','#8e24aa','#1e88e5','#43a047','#6d4c41','#546e7a'];
const DEFAULTS = [ // name, unit, selling $/unit (workbook cost x 1.38), category
  ["Beef Super","kg",6.00,"Beef"],["Beef Commercial","kg",5.52,"Beef"],
  ["Beef Manufacturing","kg",4.97,"Beef"],["T-Bone Steak","kg",5.52,"Beef"],
  ["Offals","kg",4.00,"Beef"],["Beef Bones","kg",4.00,"Beef"],["Liver","kg",4.97,"Beef"],
  ["Bibles","kg",4.00,"Beef"],["Beef Mince","kg",5.52,"Beef"],
  ["Chicken Meat","kg",5.52,"Chicken"],["Chicken Feet","kg",4.00,"Chicken"],
  ["Chicken Necks","kg",4.00,"Chicken"],["Chicken Livers","kg",4.00,"Chicken"],
  ["Eggs","tray",5.52,"Chicken"],
  ["Pork Meat","kg",6.00,"Pork"],["Trotters","kg",5.52,"Pork"],["Pork Head","kg",5.52,"Pork"],
  ["Polony","kg",6.00,"Processed"],["Russian Sausages","kg",4.97,"Processed"],
  ["Sausages","kg",5.52,"Processed"]
].map(([name,unit,price,cat]) => ({name,unit,price,cat,cost:round2(price/1.38),stock:0,low:0}));

let products = load('mc_products', DEFAULTS);
for (const p of products){                               // migrate older data
  if (!p.cat) p.cat = 'Other';
  if (p.cost == null) p.cost = round2(p.price/1.38);     // workbook rule: sell = cost x 1.38
  if (p.stock == null) p.stock = 0;
  if (p.low == null) p.low = 0;                          // 0 = no restock alert
}
let sales = load('mc_sales', []);
let deliveries = load('mc_deliveries', []);
let audit = load('mc_audit', []);
let ticket = [], tab = 'sell', view = 'cats', selCat = null;
let office = 'reports', pinOK = false, cur = null, mode = 'kg';
let repFrom = today(), repTo = today();
let itemsSnap = null, adjIdx = null;
let closes = load('mc_closes', []);
let closeStep = 'start', closeDraft = null, viewTs = null;
let batches = load('mc_batches', []);
let adjustments = load('mc_adjust', []);   // valued stock write-offs / corrections (spoilage etc.)
let cutDraft = null;
let shop = load('mc_shop', { name:'Meat Centre', line2:'', footer:'Thank you, come again!',
                             printer:'off', auto:false, tolKg:0.2, tolTill:0.02 });
if (shop.tolKg == null) shop.tolKg = 0.2;      // count tolerance per line
if (shop.tolTill == null) shop.tolTill = 0.02; // till tolerance (fraction of takings)
if (!Array.isArray(shop.ovh)) shop.ovh = [     // monthly overheads (from the Vision model)
  {name:'Rent & utilities', amt:230.77}, {name:'Wages', amt:200},
  {name:'Staff lunch', amt:30}, {name:'Licensing', amt:46.03},
  {name:'Equipment hire (yr 1)', amt:110}];
if (shop.wdays == null) shop.wdays = 30;       // working days per month (overhead divisor)
if (shop.loan == null) shop.loan = 580.18;     // loan repayment $/mo — financing, shown separately
let lastSaleId = null;
function saveShop(){ localStorage.setItem('mc_shop', JSON.stringify(shop)); }

function load(k, d){ try { return JSON.parse(localStorage.getItem(k)) || d; } catch(e){ return d; } }
function save(){ localStorage.setItem('mc_products', JSON.stringify(products));
                 localStorage.setItem('mc_sales', JSON.stringify(sales));
                 localStorage.setItem('mc_deliveries', JSON.stringify(deliveries));
                 localStorage.setItem('mc_audit', JSON.stringify(audit));
                 localStorage.setItem('mc_closes', JSON.stringify(closes));
                 localStorage.setItem('mc_batches', JSON.stringify(batches));
                 localStorage.setItem('mc_adjust', JSON.stringify(adjustments)); }
function logAudit(type, detail){
  audit.push({date:today(), time:new Date().toTimeString().slice(0,5), type, detail});
  if (audit.length > 2000) audit = audit.slice(-1500);   // keep the log from growing forever
}
function today(){ const d = new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function fmt(n){ return '$'+n.toFixed(2); }
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;'); }
function round2(n){ return Math.round(n*100)/100; }
function round3(n){ return Math.round(n*1000)/1000; }
function cats(){ const seen = []; for (const p of products) if (!seen.includes(p.cat)) seen.push(p.cat); return seen; }
function catColor(c){ return CAT_COLORS[c] || PALETTE[cats().indexOf(c) % PALETTE.length]; }
function toast(msg, bad){ const t = document.getElementById('toast'); t.textContent = msg;
  t.style.background = bad ? 'var(--red)' : 'var(--greend)'; t.style.display = 'block';
  clearTimeout(t._h); t._h = setTimeout(()=>t.style.display='none', 1800); }

// ---------------- navigation / render ----------------
function goSell(){ tab = 'sell'; if (view === 'office') view = 'cats'; render(); }
function goOffice(){ if (pinOK) { tab = 'office'; render(); }
  else pinAsk('Enter owner PIN', pin => {
    if (pin === (localStorage.getItem('mc_pin') || '2026')) { pinOK = true; tab = 'office'; render(); }
    else { toast('Wrong PIN', true); }
  });
}
function render(){
  document.getElementById('hdrdate').textContent = today();
  document.getElementById('nav-sell').classList.toggle('on', tab==='sell');
  document.getElementById('nav-office').classList.toggle('on', tab==='office');
  const m = document.getElementById('main'), hdr = document.getElementById('hdr');
  if (tab === 'sell'){
    if (view === 'cats'){ hdr.textContent = 'Meat Centre POS'; m.innerHTML = catsView(); }
    else if (view === 'items'){ hdr.innerHTML = `<span class="back" onclick="view='cats';render()">‹</span> ${esc(selCat)}`; m.innerHTML = itemsGrid(); }
    else { hdr.innerHTML = `<span class="back" onclick="view='items';render()">‹</span> Ticket`; m.innerHTML = chargeView(); }
  } else {
    hdr.textContent = 'Back Office';
    m.innerHTML = officeView();
  }
  tbar();
}
function tbar(){ const b = document.getElementById('tbar');
  const total = ticket.reduce((s,l)=>s+l.amt,0);
  const show = tab==='sell' && view!=='charge' && ticket.length;
  b.style.display = show ? 'flex' : 'none';
  if (show) b.innerHTML = `<span>${ticket.length} item${ticket.length>1?'s':''}</span><span>CHARGE ${fmt(total)} ›</span>`;
}

// ---------------- SELL ----------------
function catsView(){
  return '<div class="grid">' + cats().map(c => {
    const n = products.filter(p=>p.cat===c).length;
    return `<button class="cat" style="background:${catColor(c)}" onclick="selCat='${esc(c)}';view='items';render()">
      ${esc(c)}<small>${n} item${n>1?'s':''}</small></button>`;
  }).join('') + '</div>';
}
function itemsGrid(){
  return '<div class="igrid">' + products.map((p,i) => p.cat!==selCat ? '' :
    `<button style="--cc:${catColor(p.cat)}" onclick="openModal(${i})">${esc(p.name)}
     <small>${fmt(p.price)}/${esc(p.unit)}</small></button>`).join('') + '</div>';
}
function chargeView(){
  const lines = ticket.map((l,i) =>
    `<div class="line"><span>${esc(l.name)} — ${l.kg.toFixed(3)} ${esc(l.unit)}</span>
     <span>${fmt(l.amt)}<span class="x" onclick="ticket.splice(${i},1);if(!ticket.length)view='items';render()">✕</span></span></div>`).join('');
  const total = ticket.reduce((s,l)=>s+l.amt,0);
  return `<div class="ticket">${lines}
      <div class="tot"><span>TOTAL</span><span>${fmt(total)}</span></div>
      <div class="payrow">
        <button class="p-cash" onclick="pay('Cash')">CASH</button>
        <button class="p-eco" onclick="pay('EcoCash')">ECOCASH</button>
        <button class="p-swipe" onclick="pay('Swipe')">SWIPE</button>
      </div></div>
    <div class="note">Take the money / confirm the EcoCash or swipe approval BEFORE pressing the button.</div>`;
}
function openModal(i){ cur = products[i]; mode = 'kg';
  document.getElementById('m-name').textContent = cur.name;
  document.getElementById('m-price').textContent = fmt(cur.price)+' per '+cur.unit;
  document.getElementById('tog-kg').textContent = 'By '+(cur.unit==='kg'?'weight':cur.unit);
  setMode('kg');
  const q = document.getElementById('qty'); q.value = '';
  document.getElementById('modal').classList.add('open');
  setTimeout(()=>q.focus(), 50);
}
function setMode(m){ mode = m;
  document.getElementById('tog-kg').classList.toggle('on', m==='kg');
  document.getElementById('tog-usd').classList.toggle('on', m==='usd');
  document.getElementById('qty').placeholder = m==='kg' ? '0.000' : '0.00';
  conv();
}
function conv(){ const v = parseFloat(document.getElementById('qty').value), c = document.getElementById('conv');

// ---------------- receipts & printing ----------------
const RW = 32;                                   // characters per line on a 58 mm printer
function rPad(l, r){ l = String(l); r = String(r);
  if (l.length > RW - r.length - 1) l = l.slice(0, RW - r.length - 1);
  return l + ' '.repeat(RW - l.length - r.length) + r; }
function rCenter(s){ s = String(s).slice(0, RW);
  return ' '.repeat(Math.floor((RW - s.length) / 2)) + s; }
function receiptText(s){
  const div = '-'.repeat(RW), L = [];
  L.push(rCenter(shop.name.toUpperCase()));
  if (shop.line2) L.push(rCenter(shop.line2));
  L.push(div);
  L.push(rPad(s.date + ' ' + s.time, '#' + String(s.id).slice(-6)));
  L.push(div);
  for (const l of s.lines){
    L.push(l.name.slice(0, RW));
    L.push(rPad('  ' + l.kg.toFixed(3) + ' ' + l.unit + ' @ ' + fmt(l.price), fmt(l.amt)));
  }
  L.push(div);
  L.push(rPad('TOTAL', fmt(s.total)));
  L.push('Paid: ' + s.pay + (s.void ? '  ** VOIDED **' : ''));
  L.push(div);
  if (shop.footer) L.push(rCenter(shop.footer));
  return L.join('\n');
}

function printSale(idOrSale){
  const s = typeof idOrSale === 'object' ? idOrSale : sales.find(x => x.id === idOrSale);
  if (!s) return;

  else if (shop.printer === 'rawbt') rawbtPrint(txt);
  else if (shop.printer === 'pdf') pdfPrint(s);
  else shareTxt(txt);
}
// Hand-rolled single-page PDF (Courier, 58 mm slip width) — keeps the app dependency-free
function pdfBlob(txt){
  const lines = txt.split('\n');
  const W = 164, LH = 9.6, H = Math.max(80, Math.round(lines.length * LH + 26));
  const escP = s => s.replace(/\\/g,'\\\\').replace(/\(/g,'\\(').replace(/\)/g,'\\)');
  const content = 'BT /F1 8 Tf ' + LH + ' TL 1 0 0 1 5 ' + (H - 14) + ' Tm\n' +
    lines.map(l => '(' + escP(l) + ') Tj T*\n').join('') + 'ET';
  const objs = [
    '<< /Type /Catalog /Pages 2 0 R >>',
    '<< /Type /Pages /Kids [3 0 R] /Count 1 >>',
    '<< /Type /Page /Parent 2 0 R /MediaBox [0 0 ' + W + ' ' + H + '] ' +
      '/Resources << /Font << /F1 4 0 R >> >> /Contents 5 0 R >>',
    '<< /Type /Font /Subtype /Type1 /BaseFont /Courier >>',
    '<< /Length ' + content.length + ' >>\nstream\n' + content + '\nendstream'
  ];
  let pdf = '%PDF-1.4\n'; const offs = [];
  objs.forEach((o, i) => { offs.push(pdf.length); pdf += (i+1) + ' 0 obj\n' + o + '\nendobj\n'; });
  const xref = pdf.length;
  pdf += 'xref\n0 ' + (objs.length + 1) + '\n0000000000 65535 f \n' +
    offs.map(o => String(o).padStart(10, '0') + ' 00000 n \n').join('') +
    'trailer\n<< /Size ' + (objs.length + 1) + ' /Root 1 0 R >>\nstartxref\n' + xref + '\n%%EOF';
  return new Blob([pdf], {type:'application/pdf'});
}
async function pdfPrint(s){
  const blob = pdfBlob(receiptText(s));
  const name = 'receipt-' + s.date + '-' + String(s.id).slice(-6) + '.pdf';
  try {
    const file = new File([blob], name, {type:'application/pdf'});
    if (navigator.canShare && navigator.canShare({files:[file]})){
      await navigator.share({files:[file], title:'Receipt'}); return; }
  } catch(e){ if (e.name === 'AbortError') return; }   // user closed the share sheet
  dl(blob, name, 'application/pdf'); toast('Receipt PDF downloaded');
}

function rawbtPrint(txt){

// Direct Web-Bluetooth ESC/POS (Bluetooth-LE printers)
const BT_SERVICES = ['000018f0-0000-1000-8000-00805f9b34fb',
  'e7810a71-73ae-499d-8c15-faa9aef0c3f2', '49535343-fe7d-4ae5-8fa9-9fafd205e455',
  '0000ff00-0000-1000-8000-00805f9b34fb', '0000ffe0-0000-1000-8000-00805f9b34fb'];
let btDev = null, btChar = null;
async function btPick(){
  if (!navigator.bluetooth){ toast('Bluetooth not available in this browser', true); return; }
  try {
    btDev = await navigator.bluetooth.requestDevice(
      { acceptAllDevices:true, optionalServices:BT_SERVICES });
    btChar = null;
    toast('Printer selected: ' + (btDev.name || 'unnamed device'));
  } catch(e){ /* user closed the picker */ }
}
async function btEnsure(){
  if (!btDev) await btPick();
  if (!btDev) throw new Error('no printer chosen');
  if (btChar && btDev.gatt.connected) return;
  const g = await btDev.gatt.connect();
  for (const uuid of BT_SERVICES){
    try { const svc = await g.getPrimaryService(uuid);
      const chars = await svc.getCharacteristics();
      btChar = chars.find(c => c.properties.write || c.properties.writeWithoutResponse);
      if (btChar) return;
    } catch(e){}
  }
  throw new Error('printer service not found');
}
async function btPrint(txt){
  try {
    await btEnsure();
    const enc = new TextEncoder();
    const bytes = new Uint8Array([0x1b, 0x40,                    // ESC @ init
      ...enc.encode(txt + '\n\n\n\n'), 0x1d, 0x56, 0x42, 0x00]); // GS V partial cut
    for (let i = 0; i < bytes.length; i += 100){
      const chunk = bytes.slice(i, i + 100);
      if (btChar.properties.writeWithoutResponse) await btChar.writeValueWithoutResponse(chunk);
      else await btChar.writeValue(chunk);
      await new Promise(r => setTimeout(r, 20));
    }
    toast('Receipt sent to printer');
  } catch(e){ toast('Print failed — ' + e.message, true); }
}

function rangeSales(){ return sales.filter(s => s.date >= repFrom && s.date <= repTo); }
function costOf(name){ const p = products.find(x => x.name === name); return p ? p.cost||0 : 0; }
function lineCost(l){ return l.kg * (l.cost != null ? l.cost : costOf(l.name)); }
function lowStock(){ return products.filter(p => p.low > 0 && p.stock <= p.low); }
// cash legitimately paid out of the till at a close, and the till gap that accounts for it
function payoutOf(c){ return round2((c.payouts||[]).reduce((s,x)=>s+(parseFloat(x.amt)||0),0)); }
function tillGapOf(c){ return round2((c.actual.Cash+c.actual.EcoCash+c.actual.Swipe)
  + payoutOf(c) - (c.theo.Cash+c.theo.EcoCash+c.theo.Swipe)); }
function agg(){ const m = {};
  for (const s of rangeSales()) if (!s.void)
    for (const l of s.lines){ m[l.name] = m[l.name] || {kg:0, amt:0, cogs:0};
      m[l.name].kg += l.kg; m[l.name].amt += l.amt; m[l.name].cogs += lineCost(l); }
  return m;
}
function reportsView(){
  const list = rangeSales(), a = agg(), live = list.filter(s=>!s.void);
  const tot = live.reduce((s,x)=>s+x.total,0);
  const by = how => live.filter(s=>s.pay===how).reduce((s,x)=>s+x.total,0);
  const cogs = Object.values(a).reduce((s,x)=>s+x.cogs,0);
  // controls figures for the same date range
  const rc = closes.filter(c => c.date >= repFrom && c.date <= repTo);
  const tillGap = round2(rc.reduce((s,c) => s + tillGapOf(c), 0));
  const cashExp = round2(rc.reduce((s,c) => s + payoutOf(c), 0));   // cash paid out of the till
  const ra = adjustments.filter(a => a.date >= repFrom && a.date <= repTo);
  const wasteCost = round2(ra.filter(a=>a.delta<0).reduce((s,a)=>s + (-a.delta)*(a.cost||0), 0)); // write-offs at cost
  const missing = round2(rc.reduce((s,c) =>
    s + c.lines.filter(l=>l.varVal<0).reduce((x,l)=>x+l.varVal,0), 0));
  const rb = batches.filter(b => b.date >= repFrom && b.date <= repTo);
  const cutIn = rb.reduce((s,b)=>s+b.inputKg,0);
  const avgY = cutIn > 0 ? rb.reduce((s,b)=>s+b.outKg,0)/cutIn : null;
  const waste = round3(rb.reduce((s,b)=>s+b.waste,0));
  const uplift = round2(rb.reduce((s,b)=>s+b.uplift,0));
  const owe = round2(deliveries.filter(d=>!d.paid).reduce((s,d)=>s+d.invKg*d.cost,0));
  // Day P&L: absorb monthly overheads at a daily rate over the calendar days in range
  const totOvh = round2(shop.ovh.reduce((s,o)=>s+(o.amt||0),0));
  const dailyOvh = totOvh/(shop.wdays||30);
  const days = Math.max(1, Math.round((new Date(repTo)-new Date(repFrom))/86400000)+1);
  const ovhRange = round2(dailyOvh*days);
  const netOp = round2(tot - cogs - ovhRange - wasteCost - cashExp);
  const marginR = tot > 0 ? (tot-cogs)/tot : 0;
  const beDay = marginR > 0 ? round2(dailyOvh/marginR) : null;
  const loanDay = (shop.loan||0)/(shop.wdays||30);
  const afterLoan = round2(netOp - loanDay*days);
  const byDay = {};
  for (const s of live){
    byDay[s.date] = byDay[s.date] || {sales:0, cogs:0};

      <td class="n">${fmt(net)}</td></tr>`; }).join('');
  const names = [...products.map(p=>p.name), ...Object.keys(a).filter(n=>!products.some(p=>p.name===n))];
  const rows = names.filter(n=>a[n]).map(n =>
    `<tr><td>${esc(n)}</td><td class="n">${a[n].kg.toFixed(3)}</td><td class="n">${fmt(a[n].amt)}</td>

  const cards = [...list].reverse().slice(0,60).map(s =>
    `<div class="salecard${s.void?' void':''}">
      <div class="top"><span>${s.date} ${s.time} · ${s.pay}</span><span>${fmt(s.total)}
        <button class="voidbtn" style="border-color:#607d8b;color:#607d8b" onclick="printSale(${s.id})">PRINT</button>

    </div>`).join('');
  return `<div class="toolbar">
      <input type="date" value="${repFrom}" onchange="repFrom=this.value;render()">
      <span>to</span>

    <div class="kpis">
      <div class="kpi"><b>${fmt(tot)}</b><span>Total</span></div>
      <div class="kpi"><b>${fmt(by('Cash'))}</b><span>Cash</span></div>
      <div class="kpi"><b>${fmt(by('EcoCash'))}</b><span>EcoCash</span></div>
      <div class="kpi"><b>${fmt(by('Swipe'))}</b><span>Swipe</span></div>
    </div>
    <div class="kpis">
      <div class="kpi"><b>${fmt(cogs)}</b><span>Restock value (cost of sold)</span></div>
      <div class="kpi"><b>${fmt(tot - cogs)}</b><span>Gross profit</span></div>
      <div class="kpi"><b>${tot ? Math.round((tot-cogs)/tot*100)+'%' : '—'}</b><span>Margin</span></div>
      <div class="kpi"${lowStock().length?' style="outline:2px solid var(--red)"':''}>

    const lowYield = b.yield < 0.95;
    return `<div class="salecard"${lowYield?' style="border-left:4px solid var(--red)"':''}>
      <div class="top"><span>${b.date} ${b.time} · ${esc(b.source)}</span>
        <span${lowYield?' style="color:var(--red)"':''}>${Math.round(b.yield*1000)/10}% yield</span></div>
      <div class="lines">${b.inputKg.toFixed(3)} kg in → ${b.outKg.toFixed(3)} kg out ·
        waste ${b.waste.toFixed(3)} kg · uplift ${fmt(b.uplift)}<br>
        ${b.outs.map(o => esc(o.name)+' '+o.kg.toFixed(3)).join(', ')}</div>
    </div>`; }).join('');
  return `<div class="icard">
      <b style="font-size:15px">Cutting / break down</b>
      <div class="note" style="margin-top:6px">Weigh the side or piece before cutting, cut,
        then weigh every output. Stock moves automatically: the source comes out, the cuts go
        in. Beef should return roughly <b>95%+</b> of input as saleable product (bones and
        offal count) — every lost kg is money off the counter.</div>
      <button class="bigbtn" onclick="cutDraft={src:'',inKg:'',cost:'',outs:[{name:'',kg:''},{name:'',kg:''},{name:'',kg:''}]};render()">START A BATCH</button>
      <button class="bigbtn grey" onclick="office='stock';render()">‹ Back to Stock</button>
    </div>
    ${cards || '<div class="note">No batches recorded yet.</div>'}`;
}
function cutEntry(){
  const opts = sel => products.map(p =>
    `<option${sel===p.name?' selected':''}>${esc(p.name)}</option>`).join('');
  const outRows = cutDraft.outs.map((o,i) =>
    `<div class="itemrow">
      <select style="flex:2" onchange="cutDraft.outs[${i}].name=this.value;cutSum()">
        <option value="">— cut produced —</option>${opts(o.name)}</select>
      <input style="flex:1" type="number" inputmode="decimal" step="any" placeholder="kg"
             value="${o.kg}" onchange="cutDraft.outs[${i}].kg=this.value;cutSum()">
    </div>`).join('');
  return `<div class="icard">
      <b style="font-size:15px">New batch</b>
      <div class="itemrow" style="margin-top:8px">
        <select style="flex:2" onchange="cutSrc(this.value)">
          <option value="">— source item —</option>${opts(cutDraft.src)}</select>
      </div>
      <div class="itemrow lab"><span style="flex:1">input kg (weighed)</span><span style="flex:1">cost $/kg</span></div>
      <div class="itemrow">
        <input id="cut-in" style="flex:1" type="number" inputmode="decimal" step="any" placeholder="0.000"
               value="${cutDraft.inKg}" onchange="cutDraft.inKg=this.value;cutSum()">
        <input id="cut-cost" style="flex:1" type="number" inputmode="decimal" step="0.01" placeholder="0.00"
               value="${cutDraft.cost}" onchange="cutDraft.cost=this.value;cutSum()">
      </div>
      <div class="itemrow lab"><span>outputs — weigh every cut</span></div>
      ${outRows}
      <button class="bigbtn grey" onclick="cutDraft.outs.push({name:'',kg:''});render()">+ Add another cut</button>
      <div id="cut-sum" class="note"></div>
      <button class="bigbtn" onclick="doCut()">SAVE BATCH</button>
      <button class="bigbtn grey" onclick="cutDraft=null;render()">Cancel</button>
    </div>`;
}
function cutSrc(name){ cutDraft.src = name;
  const p = products.find(x => x.name === name);
  if (p && cutDraft.cost === ''){ cutDraft.cost = p.cost;
    document.getElementById('cut-cost').value = p.cost; }
  cutSum();
}
function cutCalc(){
  const inKg = parseFloat(cutDraft.inKg) || 0, cost = parseFloat(cutDraft.cost) || 0;
  const outs = cutDraft.outs.filter(o => o.name && parseFloat(o.kg) > 0)
    .map(o => ({name:o.name, kg:round3(parseFloat(o.kg)),
                price:(products.find(p=>p.name===o.name)||{}).price || 0}));
  const outKg = round3(outs.reduce((s,o)=>s+o.kg,0));
  const retail = round2(outs.reduce((s,o)=>s+o.kg*o.price,0));
  return {inKg, cost, outs, outKg, retail,
          waste: round3(inKg-outKg), yieldPct: inKg>0 ? outKg/inKg : 0,
          inputCost: round2(inKg*cost), uplift: round2(retail - inKg*cost)};
}
function cutSum(){
  const c = cutCalc(), el = document.getElementById('cut-sum');
  if (!el) return;
  if (!(c.inKg>0) || !c.outs.length){ el.innerHTML = ''; return; }
  el.innerHTML = 'Out '+c.outKg.toFixed(3)+' of '+c.inKg.toFixed(3)+' kg = <b>'+
    (Math.round(c.yieldPct*1000)/10)+'% yield</b> · waste '+c.waste.toFixed(3)+' kg · retail value '+
    fmt(c.retail)+' vs cost '+fmt(c.inputCost)+' = <b>uplift '+fmt(c.uplift)+'</b>'+
    (c.outKg > c.inKg ? '<br><b style="color:var(--red)">Outputs weigh MORE than the input — recheck.</b>' : '');
}
function doCut(){
  const c = cutCalc();
  const src = products.find(p => p.name === cutDraft.src);
  if (!src){ toast('Choose the source item', true); return; }
  if (!(c.inKg > 0)){ toast('Enter the input weight', true); return; }
  if (!c.outs.length){ toast('Enter at least one output cut', true); return; }
  if (c.outKg > c.inKg){ toast('Outputs weigh more than the input — recheck the scales', true); return; }
  if (c.outs.some(o => o.name === src.name)){
    // selling leftover under the source's own name is fine — it just stays as source stock
  }
  ask('Save this batch? '+c.inKg.toFixed(3)+' kg '+src.name+' → '+c.outKg.toFixed(3)+' kg of cuts ('+
      (Math.round(c.yieldPct*1000)/10)+'% yield). Stock moves now.', () => {
    src.stock = round3((src.stock||0) - c.inKg);
    for (const o of c.outs){ const p = products.find(x => x.name === o.name);
      if (p) p.stock = round3((p.stock||0) + o.kg); }
    const b = {ts:Date.now(), date:today(), time:new Date().toTimeString().slice(0,5),
               source:src.name, inputKg:c.inKg, costKg:c.cost, inputCost:c.inputCost,
               outs:c.outs, outKg:c.outKg, yield:round3(c.yieldPct), waste:c.waste,
               retail:c.retail, uplift:c.uplift};
    batches.push(b);
    logAudit('cutting', src.name+' '+c.inKg.toFixed(3)+' kg → '+
      c.outs.map(o=>o.name+' '+o.kg.toFixed(3)).join(', ')+
      ' ('+(Math.round(c.yieldPct*1000)/10)+'% yield, waste '+c.waste.toFixed(3)+' kg)');
    cutDraft = null; save(); render();
    toast(c.yieldPct < 0.95 ? 'Saved — yield below 95%, review the cutting' : 'Batch saved, stock updated');
  });
}

// ---------------- DAILY CLOSE (blind count + till reconciliation) ----------------
function closeView(){
  if (closeStep === 'count') return closeCount();
  if (closeStep === 'cash') return closeCash();
  if (closeStep === 'result') return closeResult();
  const cards = [...closes].reverse().slice(0,14).map(c => {
    const theoT = round2(c.theo.Cash + c.theo.EcoCash + c.theo.Swipe);
    const gap = tillGapOf(c);
    const missing = round2(c.lines.filter(l=>l.varVal<0).reduce((s,l)=>s+l.varVal,0));
    const bad = (theoT > 0 && Math.abs(gap)/theoT > shop.tolTill) || missing < 0;
    return `<div class="salecard" onclick="viewTs=${c.ts};closeStep='result';render()"
      ${bad?'style="border-left:4px solid var(--red)"':''}>
      <div class="top"><span>${c.date} ${c.time}</span><span>till ${gap<0?'':'+'}${fmt(gap).replace('$-','-$')}</span></div>
      <div class="lines">missing stock ${fmt(Math.abs(missing))} · ${c.lines.length} lines counted · tap to view</div>
    </div>`; }).join('');
  return `<div class="icard">
      <b style="font-size:15px">Daily Close</b>
      <div class="note" style="margin-top:6px">The evening ritual, ~10 minutes: <b>1.</b> weigh
        every line and enter the scale figure (the app hides what it expects — count blind, that
        is the whole point), <b>2.</b> count the till, <b>3.</b> the app reveals the variances,
        locks the record and resets stock to your counts. The person selling never counts alone.</div>
      <button class="bigbtn" onclick="closeDraft={counts:{},cash:'',eco:'',swipe:'',note:'',payouts:[]};closeStep='count';render()">START DAILY CLOSE</button>
    </div>
    ${cards || '<div class="note">No closes recorded yet.</div>'}`;
}
function closeCount(){
  const rows = products.map(p =>
    `<div class="itemrow">
      <span style="flex:2;font-size:14px">${esc(p.name)} <small style="color:#90a4ae">${esc(p.unit)}</small></span>
      <input style="flex:1" type="number" inputmode="decimal" step="any" placeholder="—"
             value="${closeDraft.counts[p.name] ?? ''}"
             onchange="closeDraft.counts['${esc(p.name)}']=this.value">
    </div>`).join('');
  return `<div class="icard">
      <b style="font-size:15px">Step 1 of 2 — blind stock count</b>
      <div class="note" style="margin:6px 0 10px">Weigh each line and enter exactly what the
        scale says. Leave blank anything you did not count. No expected figures are shown —
        do not peek at the Stock tab.</div>
      ${rows}
      <button class="bigbtn" onclick="closeNext()">NEXT — COUNT THE TILL ›</button>
      <button class="bigbtn grey" onclick="closeStep='start';render()">Cancel</button>
    </div>`;
}
function closeNext(){
  const n = Object.values(closeDraft.counts).filter(v => v !== '' && !isNaN(parseFloat(v))).length;
  if (!n){ toast('Count at least one line first', true); return; }
  closeStep = 'cash'; render();
}
function closeCash(){
  return `<div class="icard">
      <b style="font-size:15px">Step 2 of 2 — count the money</b>
      <div class="note" style="margin:6px 0 10px">Count what is IN the till. If you keep a float,
        count it separately and do NOT include it here. EcoCash and swipe come off the phone /
        machine statements for the day.</div>
      <div class="itemrow lab"><span style="flex:1">cash in till $</span><span style="flex:1">EcoCash $</span><span style="flex:1">swipe $</span></div>
      <div class="itemrow">
        <input style="flex:1" type="number" inputmode="decimal" step="0.01" placeholder="0.00"
               value="${closeDraft.cash}" onchange="closeDraft.cash=this.value">
        <input style="flex:1" type="number" inputmode="decimal" step="0.01" placeholder="0.00"
               value="${closeDraft.eco}" onchange="closeDraft.eco=this.value">
        <input style="flex:1" type="number" inputmode="decimal" step="0.01" placeholder="0.00"
               value="${closeDraft.swipe}" onchange="closeDraft.swipe=this.value">
      </div>
      <div class="itemrow lab" style="margin-top:6px"><span>cash paid OUT of the till today (gas, bags, casual labour…)</span></div>
      ${(closeDraft.payouts||[]).map((po,i) => `<div class="itemrow">
        <input style="flex:1" type="number" inputmode="decimal" step="0.01" placeholder="$ amount"
               value="${po.amt}" onchange="closeDraft.payouts[${i}].amt=this.value">
        <input style="flex:1.6" placeholder="what for (required)"
               value="${esc(po.reason||'')}" onchange="closeDraft.payouts[${i}].reason=this.value">
        <button class="del" onclick="closeDraft.payouts.splice(${i},1);render()">✕</button>
      </div>`).join('')}
      <button class="bigbtn grey" onclick="(closeDraft.payouts=closeDraft.payouts||[]).push({amt:'',reason:''});render()">+ Add a cash pay-out</button>
      <div class="note">Every dollar taken from the till for a shop expense goes here — otherwise it
        reads as a shortage. These are logged and reduce the day's profit.</div>
      <div class="itemrow" style="margin-bottom:0;margin-top:6px">
        <input style="flex:1" placeholder="Note (optional — anything unusual today)"
               value="${esc(closeDraft.note)}" onchange="closeDraft.note=this.value">
      </div>
      <button class="bigbtn" onclick="ask('Save and LOCK this close? Stock resets to your counted figures and the record cannot be edited afterwards.', doClose)">SAVE &amp; REVEAL</button>
      <button class="bigbtn grey" onclick="closeStep='count';render()">‹ Back to the count</button>
    </div>`;
}
function doClose(){
  const ts = Date.now();
  const lastTs = closes.length ? closes[closes.length-1].ts : 0;
  const win = sales.filter(s => !s.void && s.id > lastTs);
  const theo = {Cash:0, EcoCash:0, Swipe:0};
  for (const s of win) theo[s.pay] = round2((theo[s.pay]||0) + s.total);
  const lines = [];
  for (const p of products){
    const raw = closeDraft.counts[p.name];
    if (raw === undefined || raw === '') continue;
    const counted = parseFloat(raw);
    if (isNaN(counted)) continue;
    const expected = round3(p.stock||0);
    const varKg = round3(counted - expected);
    lines.push({name:p.name, unit:p.unit, price:p.price, expected, counted:round3(counted),
                varKg, varVal:round2(varKg * p.price)});
    p.stock = round3(counted);                       // physical truth wins
  }
  const actual = {Cash:round2(parseFloat(closeDraft.cash)||0),
                  EcoCash:round2(parseFloat(closeDraft.eco)||0),
                  Swipe:round2(parseFloat(closeDraft.swipe)||0)};
  const rawPo = (closeDraft.payouts||[]).filter(p => (parseFloat(p.amt)||0) > 0);
  if (rawPo.some(p => !String(p.reason||'').trim())){
    toast('Every cash pay-out needs a reason', true); return; }        // don't lock without it
  const payouts = rawPo.map(p => ({amt:round2(parseFloat(p.amt)), reason:String(p.reason).trim()}));
  const c = {ts, date:today(), time:new Date().toTimeString().slice(0,5),
             lines, theo, actual, payouts, note:closeDraft.note.trim(), tolKg:shop.tolKg, tolTill:shop.tolTill};
  closes.push(c);
  const theoT = round2(theo.Cash + theo.EcoCash + theo.Swipe);
  const missing = round2(lines.filter(l=>l.varVal<0).reduce((s,l)=>s+l.varVal,0));
  for (const p of payouts) logAudit('cash-payout', fmt(p.amt)+' — '+p.reason);
  logAudit('close', 'till '+fmt(tillGapOf(c))+' vs takings '+fmt(theoT)+
    (payoutOf(c)?', cash paid out '+fmt(payoutOf(c)):'')+
    ', missing stock '+fmt(Math.abs(missing))+', '+lines.length+' lines counted (stock reset to counts)');
  viewTs = ts; closeStep = 'result'; save(); render();
}
function closeResult(){
  const c = closes.find(x => x.ts === viewTs) || closes[closes.length-1];
  if (!c){ closeStep = 'start'; return closeView(); }
  const tolKg = c.tolKg ?? shop.tolKg, tolTill = c.tolTill ?? shop.tolTill;
  const theoT = round2(c.theo.Cash + c.theo.EcoCash + c.theo.Swipe);
  const payout = payoutOf(c);
  const gap = tillGapOf(c);
  const gapBad = theoT > 0 ? Math.abs(gap)/theoT > tolTill : gap !== 0;
  const missing = round2(c.lines.filter(l=>l.varVal<0).reduce((s,l)=>s+l.varVal,0));
  const flagged = c.lines.filter(l => Math.abs(l.varKg) > tolKg).length;
  const till = ['Cash','EcoCash','Swipe'].map(m => {
    const exp = round2((c.theo[m]||0) - (m==='Cash'?payout:0));   // cash that should be IN the till = takings less pay-outs
    return `<tr><td>${m}${m==='Cash'&&payout?' (less $'+payout.toFixed(2)+' out)':''}</td>
     <td class="n">${fmt(exp)}</td><td class="n">${fmt(c.actual[m]||0)}</td>
     <td class="n">${fmt(round2((c.actual[m]||0)-exp))}</td></tr>`; }).join('');
  const rows = [...c.lines].sort((a,b) => Math.abs(b.varVal)-Math.abs(a.varVal)).map(l => {
    const bad = Math.abs(l.varKg) > tolKg;
    return `<tr${bad?' style="color:var(--red);font-weight:bold"':''}>
      <td>${esc(l.name)}${bad?' ⚠':''}</td><td class="n">${l.expected.toFixed(3)}</td>
      <td class="n">${l.counted.toFixed(3)}</td><td class="n">${l.varKg>0?'+':''}${l.varKg.toFixed(3)}</td>
      <td class="n">${fmt(l.varVal)}</td></tr>`; }).join('');
  return `<div class="kpis">
      <div class="kpi"${gapBad?' style="outline:2px solid var(--red)"':''}>
        <b>${fmt(gap)}</b><span>Till gap (counted − expected)</span></div>
      <div class="kpi"${missing<0?' style="outline:2px solid var(--red)"':''}>
        <b>${fmt(Math.abs(missing))}</b><span>Missing stock (at retail)</span></div>
      <div class="kpi"><b>${fmt(theoT)}</b><span>Takings since last close</span></div>
      <div class="kpi"><b>${flagged}</b><span>Lines over ${tolKg} ${'kg'} tolerance</span></div>
    </div>
    <table style="margin-bottom:8px"><tr><th></th><th class="n">Expected $</th><th class="n">Counted $</th><th class="n">Gap $</th></tr>${till}</table>
    <table><tr><th>Product</th><th class="n">Expected</th><th class="n">Counted</th><th class="n">Var</th><th class="n">Var $</th></tr>
      ${rows || '<tr><td colspan="5" style="color:#999">No lines counted</td></tr>'}</table>
    ${payout ? `<div class="salecard" style="border-left:4px solid #fb8c00">
      <b>Cash paid out: ${fmt(payout)}</b>
      <div class="lines">${c.payouts.map(p=>fmt(p.amt)+' — '+esc(p.reason)).join('<br>')}</div></div>` : ''}
    ${c.note ? `<div class="salecard"><b>Note:</b> <span class="lines">${esc(c.note)}</span></div>` : ''}
    <div class="note">Closed ${c.date} ${c.time}. This record is locked — stock was reset to the
      counted figures. Small negatives are drip/trim loss; a pattern on the same line or the
      same shift is not. Missing stock is valued at selling price (what it would have banked).</div>
    <button class="bigbtn" onclick="viewTs=null;closeStep='start';render()">DONE</button>`;
}
function deliveriesView(){
  const opts = products.map(p=>`<option>${esc(p.name)}</option>`).join('');
  const unpaid = deliveries.filter(d=>!d.paid);
  const owing = {};
  for (const d of unpaid) owing[d.supplier] = (owing[d.supplier]||0) + d.invKg*d.cost;
  const oweTotal = Object.values(owing).reduce((s,x)=>s+x,0);
  const cards = [...deliveries].reverse().slice(0,30).map(d => {
    const short = round3(d.wKg - d.invKg);
    return `<div class="salecard">
      <div class="top"><span>${d.date} ${d.time} · ${esc(d.supplier)}</span><span>${fmt(d.invKg*d.cost)}
        ${d.paid ? '<span style="color:var(--greend)">PAID</span>'
          : `<button class="voidbtn" style="border-color:var(--greend);color:var(--greend)" onclick="markPaid(${d.id})">MARK PAID</button>`}</span></div>
      <div class="lines">${esc(d.item)} — invoiced ${d.invKg.toFixed(3)}, weighed ${d.wKg.toFixed(3)} ${esc(d.unit)} @ ${fmt(d.cost)}
        ${short < 0 ? `<span style="color:var(--red);font-weight:bold"> SHORT ${Math.abs(short).toFixed(3)} — claim it</span>`
          : short > 0 ? ` (over by ${short.toFixed(3)})` : ''}${d.note ? ' · '+esc(d.note) : ''}</div>
    </div>`; }).join('');
  return `<div class="icard">
      <b style="font-size:15px">New delivery — weigh it on YOUR scale before signing</b>
      <div class="itemrow" style="margin-top:8px">
        <input id="d-sup" style="flex:1.4" placeholder="Supplier">
        <select id="d-item" style="flex:1.4"><option value="">— item —</option>${opts}</select>
      </div>
      <div class="itemrow lab">
        <span style="flex:1">invoiced qty</span><span style="flex:1">weighed qty</span><span style="flex:1">cost $/unit</span>
      </div>
      <div class="itemrow">
        <input id="d-inv" type="number" inputmode="decimal" step="any" style="flex:1" placeholder="0.000">
        <input id="d-w" type="number" inputmode="decimal" step="any" style="flex:1" placeholder="0.000">
        <input id="d-cost" type="number" inputmode="decimal" step="0.01" style="flex:1" placeholder="0.00">
      </div>
      <div class="itemrow" style="margin-bottom:0">
        <input id="d-note" style="flex:1" placeholder="Note (optional)">
        <label style="display:flex;gap:6px;align-items:center;font-size:14px">
          <input id="d-paid" type="checkbox">Paid</label>
      </div>
      <button class="bigbtn" onclick="addDelivery()">RECEIVE INTO STOCK</button>
    </div>
    ${unpaid.length ? `<div class="salecard" style="border-left:4px solid #fb8c00">
      <b>Owing to suppliers: ${fmt(oweTotal)}</b>
      <div class="lines">${Object.entries(owing).map(([s,v])=>esc(s)+' — '+fmt(v)).join('<br>')}</div>
    </div>` : ''}
    ${cards}
    <div class="note">Weighed qty goes into stock; you PAY on invoiced qty — any shortage is claimed
      from the supplier, and it shows red above so it isn't forgotten. The item's cost price updates
      from the delivery automatically. Showing the last 30 deliveries.</div>`;
}
function addDelivery(){
  const g = id => document.getElementById(id);
  const name = g('d-item').value;
  const p = products.find(x => x.name === name);
  const invKg = parseFloat(g('d-inv').value), wKg = parseFloat(g('d-w').value), cost = parseFloat(g('d-cost').value);
  if (!p){ toast('Choose an item', true); return; }
  if (!(invKg > 0) || !(wKg > 0)){ toast('Enter invoiced AND weighed quantities', true); return; }
  if (!(cost > 0)){ toast('Enter the cost per '+p.unit, true); return; }
  const d = {id:Date.now(), date:today(), time:new Date().toTimeString().slice(0,5),
             supplier:(g('d-sup').value.trim() || 'Unknown'), item:name, unit:p.unit,
             invKg:round3(invKg), wKg:round3(wKg), cost:round2(cost),
             paid:g('d-paid').checked, note:g('d-note').value.trim()};
  deliveries.push(d);
  p.stock = round3((p.stock||0) + d.wKg);
  if (round2(cost) !== p.cost){
    logAudit('cost-change', p.name+': cost '+fmt(p.cost||0)+' → '+fmt(round2(cost))+' (delivery, '+d.supplier+')');
    p.cost = round2(cost);
  }
  logAudit('delivery', d.item+' +'+d.wKg.toFixed(3)+' '+d.unit+' @ '+fmt(d.cost)+' from '+d.supplier+(d.paid?' (paid)':' (on account)'));
  const short = round3(d.wKg - d.invKg);
  save(); render();
  toast(short < 0 ? 'Received — SHORT '+Math.abs(short).toFixed(3)+' '+d.unit+', claim it!'
                  : 'Delivery received into stock');
}
function markPaid(id){ const d = deliveries.find(x => x.id === id); if (!d) return;
  ask('Mark this delivery as paid? '+d.item+' from '+d.supplier+' — '+fmt(d.invKg*d.cost), () => {
    d.paid = true;
    logAudit('delivery-paid', d.item+' from '+d.supplier+' — '+fmt(d.invKg*d.cost));
    save(); render(); }); }
function auditView(){
  const cards = [...audit].reverse().slice(0,100).map(a =>
    `<div class="salecard"><div class="top"><span>${a.date} ${a.time}</span>
      <span style="color:#607d8b">${esc(a.type)}</span></div>
     <div class="lines">${esc(a.detail)}</div></div>`).join('');
  return `<div class="note" style="margin:0 0 4px">Append-only record of every sensitive change
      (deliveries, stock adjustments, price/cost changes, voids, restores). It cannot be edited
      from inside the app. Showing the last 100 entries.</div>
    ${cards || '<div class="note">Nothing logged yet.</div>'}`;
}
function adjOpen(i){ adjIdx = i; const p = products[i];
  document.getElementById('adj-title').textContent = 'Adjust stock — '+p.name;
  document.getElementById('adj-cur').textContent = 'App expects '+(p.stock||0).toFixed(3)+' '+p.unit+'. Enter the true figure and why it differs.';
  document.getElementById('adj-qty').value = ''; document.getElementById('adj-why').value = '';
  document.getElementById('adjmodal').classList.add('open'); }
function adjClose(){ document.getElementById('adjmodal').classList.remove('open'); }
function adjSave(){ const p = products[adjIdx]; if (!p) return;
  const v = parseFloat(document.getElementById('adj-qty').value);
  const why = document.getElementById('adj-why').value.trim();
  if (isNaN(v)){ toast('Enter the true quantity', true); return; }
  if (!why){ toast('A reason is required', true); return; }
  const from = round3(p.stock||0), to = round3(v), delta = round3(to - from);
  adjustments.push({ts:Date.now(), date:today(), time:new Date().toTimeString().slice(0,5),
    name:p.name, unit:p.unit, from, to, delta, cost:p.cost||0, reason:why}); // delta<0 = write-off at cost
  logAudit('stock-adjust', p.name+': '+from.toFixed(3)+' → '+to.toFixed(3)+' '+p.unit+' — '+why);
  p.stock = to;
  adjClose(); save(); render(); toast('Stock adjusted');
}
function stockView(){
  const cutBtn = `<button class="bigbtn grey" style="margin:0 0 8px" onclick="office='cut';render()">🔪 CUTTING / BREAK DOWN${batches.length?' · avg yield '+(Math.round(batches.reduce((s,b)=>s+b.yield,0)/batches.length*1000)/10)+'%':''}</button>`;
  const low = lowStock();
  const val = products.reduce((s,p) => s + Math.max(0, p.stock||0) * (p.cost||0), 0);
  const rows = products.map(p => {
    const isLow = p.low > 0 && p.stock <= p.low;
    return `<tr${isLow?' style="color:var(--red);font-weight:bold"':''}>
      <td>${esc(p.name)}${isLow?' ⚠':''}</td>
      <td class="n">${(p.stock||0).toFixed(3)} ${esc(p.unit)}</td>
      <td class="n">${p.low > 0 ? p.low : '—'}</td>
      <td class="n">${fmt(Math.max(0, p.stock||0) * (p.cost||0))}</td></tr>`; }).join('');
  return `${cutBtn}
    <div class="kpis">
      <div class="kpi"><b>${fmt(val)}</b><span>Stock on hand (at cost)</span></div>
      <div class="kpi"${low.length?' style="outline:2px solid var(--red)"':''}>
        <b>${low.length}</b><span>Need restocking</span></div>
    </div>
    ${low.length ? `<div class="salecard" style="border-left:4px solid var(--red)">
      <b style="color:var(--red)">Restock now:</b>
      <div class="lines">${low.map(p => esc(p.name)+' — '+(p.stock||0).toFixed(3)+' '+esc(p.unit)+' left').join('<br>')}</div>
    </div>` : ''}
    <table><tr><th>Product</th><th class="n">On hand</th><th class="n">Alert @</th><th class="n">Value $</th></tr>${rows}</table>
    <div class="note">Stock rises through <b>Goods In</b> deliveries, falls with every sale,
      goes back up if a sale is voided, and is corrected only through <b>Items → stock</b>
      (reason required, every change logged). Set <b>low @</b> above 0 on an item to get the
      red restock alert here and on the Reports screen. Reports → <b>Restock value</b> tells
      you what the goods sold in a date range cost to replace.</div>`;
}
function itemsAdmin(){
  if (!itemsSnap) itemsSnap = products.map(p => ({name:p.name, price:p.price, cost:p.cost}));
  const opts = cats().map(c=>`<option>${esc(c)}</option>`).join('');
  const rows = products.map((p,i) =>
    `<div class="icard">
      <div class="itemrow">
        <input class="nm" value="${esc(p.name)}" onchange="products[${i}].name=this.value">
        <input class="ct" value="${esc(p.cat)}" list="catlist" onchange="products[${i}].cat=this.value||'Other'">
        <button class="del" onclick="delItem(${i})">✕</button>
      </div>
      <div class="itemrow lab">
        <span class="un">unit</span><span class="pr">sell $</span><span class="co">cost $</span>
        <span class="st">stock ✎</span><span class="lo">low @</span>
      </div>
      <div class="itemrow" style="margin-bottom:0">
        <input class="un" value="${esc(p.unit)}" onchange="products[${i}].unit=this.value">
        <input class="pr" type="number" step="0.01" value="${p.price}"
               onchange="products[${i}].price=parseFloat(this.value)||0">
        <input class="co" type="number" step="0.01" value="${p.cost}"
               onchange="products[${i}].cost=parseFloat(this.value)||0">
        <button class="st" style="background:#fafafa;border:1px solid #cfd8dc;border-radius:8px;
                padding:9px 2px;font-size:13px;color:var(--text)"
                onclick="adjOpen(${i})">${(p.stock||0).toFixed(2)}</button>
        <input class="lo" type="number" step="any" value="${p.low}"
               onchange="products[${i}].low=parseFloat(this.value)||0">
      </div>
    </div>`).join('');
  return `<datalist id="catlist">${opts}</datalist>${rows}
    <button class="bigbtn grey" onclick="products.push({name:'New item',unit:'kg',price:0,cost:0,cat:'Other',stock:0,low:0});render()">+ Add product line</button>
    <button class="bigbtn" onclick="saveItems()">SAVE</button>
    <div class="note">Type a new category name in the category box to create it — it becomes a
      tile on the sell screen automatically. <b>sell $</b> = selling price (cost × 1.38 rule);
      <b>cost $</b> = buy price per unit — drives profit and restock figures. <b>stock</b> is
      read-only here: deliveries add to it through <b>Goods In</b>, and corrections go through
      the stock button (tap the figure — a reason is required and every change is logged).
      <b>low @</b> = restock alert level (0 = no alert). Price and cost changes are logged to
      the audit trail when you press SAVE.</div>`;
}
function saveItems(){
  for (const p of products){
    const s = itemsSnap && itemsSnap.find(x => x.name === p.name);
    if (!s){ logAudit('item-added', p.name+' — sell '+fmt(p.price)+', cost '+fmt(p.cost)); continue; }
    if (s.price !== p.price) logAudit('price-change', p.name+': sell '+fmt(s.price)+' → '+fmt(p.price));
    if (s.cost !== p.cost) logAudit('cost-change', p.name+': cost '+fmt(s.cost)+' → '+fmt(p.cost));
  }
  itemsSnap = null; save(); toast('Saved'); render();
}
function delItem(i){ ask('Delete "'+products[i].name+'"? Past sales of it stay in reports.', () => {
  logAudit('item-deleted', products[i].name+' (stock at deletion: '+(products[i].stock||0).toFixed(3)+')');
  products.splice(i,1); save(); render(); }); }
function settingsView(){
  const prn = shop.printer;
  return `<div class="setrow"><span>Owner PIN</span>
      <button onclick="changePin()">Change PIN</button></div>
    <div class="ticket" style="margin-bottom:8px">
      <b style="font-size:15px">Receipts</b>
      <div class="itemrow" style="margin-top:8px">
        <input style="flex:1" value="${esc(shop.name)}" placeholder="Shop name"
               onchange="shop.name=this.value;saveShop()"></div>
      <div class="itemrow">
        <input style="flex:1" value="${esc(shop.line2)}" placeholder="Address / phone (optional)"
               onchange="shop.line2=this.value;saveShop()"></div>
      <div class="itemrow">
        <input style="flex:1" value="${esc(shop.footer)}" placeholder="Footer message"
               onchange="shop.footer=this.value;saveShop()"></div>
      <div class="itemrow">
        <select style="flex:1" onchange="shop.printer=this.value;saveShop();render()">
          <option value="off" ${prn==='off'?'selected':''}>No printer — share receipt as text</option>
          <option value="pdf" ${prn==='pdf'?'selected':''}>Save / share receipt as PDF</option>
          <option value="bt" ${prn==='bt'?'selected':''}>Bluetooth thermal printer (direct)</option>
          <option value="rawbt" ${prn==='rawbt'?'selected':''}>RawBT print app</option>
        </select></div>
      ${prn==='bt' ? `<div class="mbtns" style="margin-top:4px">
          <button class="cancel" onclick="btPick()">Choose printer</button>
          <button class="ok" onclick="testPrint()">Test print</button></div>
        <div class="note">Turn the printer on, tap <b>Choose printer</b>, pick it from the list.
          Works with Bluetooth-LE printers; if yours never appears in the list, switch to the
          RawBT option instead.</div>` : ''}
      ${prn==='rawbt' ? `<button class="bigbtn grey" onclick="testPrint()">Test print</button>
        <div class="note">Install the free <b>RawBT</b> app from the Play Store once, connect the
          printer inside RawBT, and receipts from here are handed to it — works with classic
          Bluetooth and USB printers.</div>` : ''}
      ${prn==='off' ? `<div class="note">Print buttons open the Android share sheet with the
          receipt text — send it to a printer app or WhatsApp.</div>` : ''}
      ${prn==='pdf' ? `<button class="bigbtn grey" onclick="testPrint()">Test PDF</button>
        <div class="note">Print buttons create a till-slip PDF on the phone (works offline) and
          open the share sheet — send it to WhatsApp, save it to Drive, or print it from any
          printer app. If sharing isn't available the PDF downloads instead.</div>` : ''}
      <label style="display:flex;gap:8px;align-items:center;font-size:14px;margin-top:10px">
        <input type="checkbox" ${shop.auto?'checked':''}
               onchange="shop.auto=this.checked;saveShop()">
        Print automatically after every sale</label>
    </div>
    <div class="ticket" style="margin-bottom:8px">
      <b style="font-size:15px">Daily Close tolerances</b>
      <div class="itemrow lab" style="margin-top:8px">
        <span style="flex:1">count tolerance (kg/line)</span><span style="flex:1">till tolerance (%)</span>
      </div>
      <div class="itemrow" style="margin-bottom:0">
        <input style="flex:1" type="number" step="0.05" value="${shop.tolKg}"
               onchange="shop.tolKg=parseFloat(this.value)||0.2;saveShop()">
        <input style="flex:1" type="number" step="0.5" value="${round2(shop.tolTill*100)}"
               onchange="shop.tolTill=(parseFloat(this.value)||2)/100;saveShop()">
      </div>
      <div class="note">Variances beyond these flag red at the Daily Close. Current: ${shop.tolKg} kg
        per line, ±${round2(shop.tolTill*100)}% on the till.</div>
    </div>
    <div class="ticket" style="margin-bottom:8px">
      <b style="font-size:15px">Monthly overheads &amp; loan</b>
      ${shop.ovh.map((o,i) => `<div class="itemrow"${i===0?' style="margin-top:8px"':''}>
        <input style="flex:2" value="${esc(o.name)}" onchange="shop.ovh[${i}].name=this.value;saveShop()">
        <input style="flex:1" type="number" step="0.01" value="${o.amt}"
               onchange="shop.ovh[${i}].amt=parseFloat(this.value)||0;saveShop();render()">
        <button class="del" onclick="shop.ovh.splice(${i},1);saveShop();render()">✕</button>
      </div>`).join('')}
      <button class="bigbtn grey" onclick="shop.ovh.push({name:'New overhead',amt:0});saveShop();render()">+ Add overhead</button>
      <div class="itemrow lab" style="margin-top:8px">
        <span style="flex:1">working days / month</span><span style="flex:1">loan repayment $/month</span>
      </div>
      <div class="itemrow" style="margin-bottom:0">
        <input style="flex:1" type="number" step="1" value="${shop.wdays}"
               onchange="shop.wdays=parseFloat(this.value)||30;saveShop();render()">
        <input style="flex:1" type="number" step="0.01" value="${shop.loan}"
               onchange="shop.loan=parseFloat(this.value)||0;saveShop();render()">
      </div>
      <div class="note">Total ${fmt(round2(shop.ovh.reduce((s,o)=>s+(o.amt||0),0)))}/month =
        <b>${fmt(round2(shop.ovh.reduce((s,o)=>s+(o.amt||0),0)/(shop.wdays||30)))} per working day</b>,
        absorbed into the Day P&amp;L on Reports. The loan is financing, not an operating cost —
        it shows as a separate "after loan" line. Set it to 0 when the loan is repaid.</div>
    </div>
    <div class="ticket" style="margin-bottom:8px">
      <b style="font-size:15px">Month-end archive</b>
      <div class="itemrow" style="margin-top:8px;margin-bottom:0">
        <input id="arc-m" type="month" style="flex:1" value="${today().slice(0,7)}">
      </div>
      <button class="bigbtn" onclick="archiveMonth()">DOWNLOAD MONTH PACK</button>
      <button class="bigbtn grey" onclick="pruneOld()">Clear records older than selected month</button>
      <div class="note">Month-end routine: download the pack (5 CSVs + 1 JSON — allow multiple
        downloads when Chrome asks) and save all six files to Google Drive. That folder is the
        VAT / tax record base for the PBC. Then clear old months to keep the phone light —
        products, current stock and the audit log are never cleared, and the newest close is
        always kept.</div>
    </div>
    <div class="setrow"><span>Audit log</span>
      <button onclick="office='audit';render()">View</button></div>
    <div class="setrow"><span>Backup all data</span>
      <button onclick="backup()">Download</button></div>
    <div class="setrow"><span>Restore from backup</span>
      <button onclick="restore()">Choose file</button></div>
    <div class="setrow"><span>Clear test data (keep products &amp; settings)</span>
      <button onclick="clearData(false)">Clear</button></div>
    <div class="setrow"><span>Full factory reset</span>
      <button style="color:var(--red);border-color:var(--red)" onclick="clearData(true)">Reset</button></div>
    <div class="setrow"><span>Lock back office</span>
      <button onclick="pinOK=false;goSell();toast('Locked')">Lock now</button></div>
    <div class="note">Back up weekly and before any phone repair or reset — save the file to
      Google Drive. Data lives only on this device; clearing the app's storage deletes the
      sales record.</div>`;
}
function changePin(){ pinAsk('Enter NEW 4-digit PIN', p1 =>
  pinAsk('Repeat new PIN', p2 => {
    if (p1 === p2) { localStorage.setItem('mc_pin', p1); toast('PIN changed'); }
    else toast('PINs did not match', true);
  })); }
function backup(){ dl(JSON.stringify({products, sales, shop, deliveries, audit, closes, batches, adjustments}),
  'meat-pos-backup-'+today()+'.json', 'application/json'); }
// ---------------- month-end archive & prune ----------------
function archiveMonth(){
  const m = (document.getElementById('arc-m')||{}).value || today().slice(0,7);
  const inM = x => x.date && x.date.startsWith(m);
  const S = sales.filter(inM), D = deliveries.filter(inM),
        B = batches.filter(inM), C = closes.filter(inM), A = adjustments.filter(inM);
  if (!S.length && !D.length && !B.length && !C.length && !A.length){
    toast('Nothing recorded in '+m, true); return; }
  const q = v => /[",\n]/.test(String(v)) ? '"'+String(v).replace(/"/g,'""')+'"' : String(v);
  const csvOf = rows => rows.map(r => r.map(q).join(',')).join('\n');
  const files = [
    ['sales-'+m+'.csv', csvOf([
      ['Date','Time','Sale','Pay','Void','Product','Qty','Price','Amount','Cost of sold'],
      ...S.flatMap(s => s.lines.map(l => [s.date, s.time, String(s.id).slice(-6), s.pay,
        s.void?'VOID':'', l.name, l.kg.toFixed(3), l.price.toFixed(2), l.amt.toFixed(2),
        round2(l.kg*(l.cost||0)).toFixed(2)]))])],
    ['deliveries-'+m+'.csv', csvOf([
      ['Date','Time','Supplier','Item','Invoiced','Weighed','Cost/unit','Total (invoiced x cost)','Paid','Note'],
      ...D.map(d => [d.date, d.time, d.supplier, d.item, d.invKg.toFixed(3), d.wKg.toFixed(3),
        d.cost.toFixed(2), round2(d.invKg*d.cost).toFixed(2), d.paid?'Y':'N', d.note||''])])],
    ['cutting-'+m+'.csv', csvOf([
      ['Date','Time','Source','Input kg','Cost/kg','Input cost','Output kg','Yield %','Waste kg','Retail value','Uplift','Outputs'],
      ...B.map(b => [b.date, b.time, b.source, b.inputKg.toFixed(3), (b.costKg||0).toFixed(2),
        b.inputCost.toFixed(2), b.outKg.toFixed(3), (Math.round(b.yield*1000)/10), b.waste.toFixed(3),
        b.retail.toFixed(2), b.uplift.toFixed(2), b.outs.map(o=>o.name+' '+o.kg.toFixed(3)).join('; ')])])],
    ['closes-'+m+'.csv', csvOf([
      ['Date','Time','Takings Cash','Takings EcoCash','Takings Swipe','Counted Cash','Counted EcoCash','Counted Swipe','Cash paid out','Till gap','Missing stock $','Lines counted','Lines flagged','Note'],
      ...C.map(c =>
        [c.date, c.time, c.theo.Cash.toFixed(2), c.theo.EcoCash.toFixed(2), c.theo.Swipe.toFixed(2),
          c.actual.Cash.toFixed(2), c.actual.EcoCash.toFixed(2), c.actual.Swipe.toFixed(2),
          payoutOf(c).toFixed(2), tillGapOf(c).toFixed(2),
          Math.abs(round2(c.lines.filter(l=>l.varVal<0).reduce((s,l)=>s+l.varVal,0))).toFixed(2),
          c.lines.length, c.lines.filter(l=>Math.abs(l.varKg)>(c.tolKg??0.2)).length, c.note||''])])],
    ['adjustments-'+m+'.csv', csvOf([
      ['Date','Time','Product','From kg','To kg','Change kg','Cost/unit','Value at cost','Reason'],
      ...A.map(a => [a.date, a.time, a.name, a.from.toFixed(3), a.to.toFixed(3), a.delta.toFixed(3),
        (a.cost||0).toFixed(2), round2(a.delta*(a.cost||0)).toFixed(2), a.reason||''])])],
    ['archive-'+m+'.json', JSON.stringify({month:m, exported:today(), products,
      sales:S, deliveries:D, batches:B, closes:C, adjustments:A})]
  ];
  files.forEach(([name, data], i) => setTimeout(() =>
    dl(data, name, name.endsWith('.json')?'application/json':'text/csv'), i*400));
  logAudit('archive', m+' pack exported ('+S.length+' sales, '+D.length+' deliveries, '+
    B.length+' batches, '+C.length+' closes, '+A.length+' adjustments)');
  save(); toast('Month pack downloading — save all 6 files to Drive');
}
function pruneOld(){
  const m = (document.getElementById('arc-m')||{}).value || today().slice(0,7);
  const cut = m + '-01';
  const lastClose = closes[closes.length-1];
  const n = [sales, deliveries, batches, closes, adjustments]
    .reduce((s,arr) => s + arr.filter(x => x.date < cut).length, 0);
  if (!n){ toast('Nothing older than '+m+' to clear', true); return; }
  ask('Delete '+n+' records dated before '+cut+'? Only do this AFTER downloading their month packs to Drive. Products, stock and the audit log are kept.', () => {
    sales = sales.filter(x => x.date >= cut);
    deliveries = deliveries.filter(x => x.date >= cut);
    batches = batches.filter(x => x.date >= cut);
    adjustments = adjustments.filter(x => x.date >= cut);
    closes = closes.filter(x => x.date >= cut || x === lastClose);  // keep the newest close: it anchors the next till window
    logAudit('prune', n+' records before '+cut+' cleared after archiving');
    save(); render(); toast(n+' old records cleared');
  });
}
function restore(){ const inp = document.createElement('input'); inp.type = 'file'; inp.accept = '.json';
  inp.onchange = () => { const f = inp.files[0]; if (!f) return;
    f.text().then(t => { try { const d = JSON.parse(t);
        if (!Array.isArray(d.sales) || !Array.isArray(d.products)) throw 0;
        ask('Replace ALL data on this device with the backup?', () => {
          products = d.products; sales = d.sales;
          if (d.shop) { shop = d.shop; saveShop(); }
          if (Array.isArray(d.deliveries)) deliveries = d.deliveries;
          if (Array.isArray(d.audit)) audit = d.audit;
          if (Array.isArray(d.closes)) closes = d.closes;
          if (Array.isArray(d.batches)) batches = d.batches;
          if (Array.isArray(d.adjustments)) adjustments = d.adjustments;
          logAudit('restore', 'all data replaced from backup file');
          save(); render(); toast('Backup restored'); });
      } catch(e){ toast('Not a valid backup file', true); } }); };
  inp.click();
}
function clearData(full){
  pinAsk('Enter PIN to confirm', pin => {
    if (pin !== (localStorage.getItem('mc_pin') || '2026')){ toast('Wrong PIN', true); return; }
    ask(full
      ? 'FULL RESET: products, prices, overheads, PIN and ALL records go back to factory defaults. This cannot be undone — download a backup first if in any doubt.'
      : 'Clear ALL sales, deliveries, cutting batches, closes and the audit log, and zero every stock figure? Products, prices, overheads and settings are kept. This cannot be undone.',
      () => {
        if (full){ localStorage.clear(); location.reload(); return; }
        sales = []; deliveries = []; batches = []; closes = []; adjustments = []; audit = [];
        for (const p of products) p.stock = 0;
        ticket = []; closeDraft = null; cutDraft = null; closeStep = 'start'; viewTs = null;
        logAudit('reset', 'test data cleared — all records wiped, stock zeroed, products & settings kept');
        save(); render(); toast('Cleared — ready for real trading');
      });
  });
}
function dl(data, name, type){ const a = document.createElement('a');
  a.href = URL.createObjectURL(data instanceof Blob ? data : new Blob([data], {type}));
  a.download = name; a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href), 5000); }

// ---------------- boot ----------------
if ('serviceWorker' in navigator && location.protocol.startsWith('http'))
  navigator.serviceWorker.register('sw.js');
render();
</script>
</body>
